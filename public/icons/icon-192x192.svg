<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="counterBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1c"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect width="192" height="192" rx="38" ry="38" fill="url(#bg)"/>

  <!-- Top label: PUSH -->
  <text x="96" y="44" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="22" fill="#f97316" letter-spacing="6">PUSH</text>

  <!-- Odometer counter panel -->
  <rect x="18" y="56" width="156" height="82" rx="10" ry="10" fill="url(#counterBg)" stroke="#333" stroke-width="1.5"/>

  <!-- Inner shadow line top -->
  <rect x="18" y="56" width="156" height="3" rx="10" ry="0" fill="#000" opacity="0.5"/>

  <!-- Digit separators -->
  <line x1="57" y1="58" x2="57" y2="136" stroke="#333" stroke-width="1"/>
  <line x1="96" y1="58" x2="96" y2="136" stroke="#333" stroke-width="1"/>
  <line x1="135" y1="58" x2="135" y2="136" stroke="#333" stroke-width="1"/>

  <!-- Digits: 1 0 0 0 -->
  <text x="37.5" y="120" text-anchor="middle" font-family="Courier New,monospace" font-weight="700" font-size="55" fill="#f97316">1</text>
  <text x="76.5" y="120" text-anchor="middle" font-family="Courier New,monospace" font-weight="700" font-size="55" fill="#f97316">0</text>
  <text x="115.5" y="120" text-anchor="middle" font-family="Courier New,monospace" font-weight="700" font-size="55" fill="#f97316">0</text>
  <text x="154.5" y="120" text-anchor="middle" font-family="Courier New,monospace" font-weight="700" font-size="55" fill="#fb923c">0</text>

  <!-- Flip line -->
  <rect x="18" y="95" width="156" height="2" fill="#000" opacity="0.7"/>

  <!-- KG TOTAL inside panel -->
  <text x="96" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#f97316" letter-spacing="2" opacity="0.7">KG TOTAL</text>

  <!-- Bottom label: TONNES -->
  <text x="96" y="168" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="18" fill="#71717a" letter-spacing="5">TONNES</text>
</svg>
