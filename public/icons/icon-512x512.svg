<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="counterBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1c"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Top label: PUSH -->
  <text x="256" y="118" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="60" fill="#f97316" letter-spacing="16">PUSH</text>

  <!-- Odometer counter panel -->
  <rect x="48" y="150" width="416" height="210" rx="26" ry="26" fill="url(#counterBg)" stroke="#333" stroke-width="4"/>

  <!-- Inner shadow line top -->
  <rect x="48" y="150" width="416" height="8" rx="26" ry="0" fill="#000" opacity="0.5"/>

  <!-- Digit separators -->
  <line x1="152" y1="154" x2="152" y2="310" stroke="#333" stroke-width="2.5"/>
  <line x1="256" y1="154" x2="256" y2="310" stroke="#333" stroke-width="2.5"/>
  <line x1="360" y1="154" x2="360" y2="310" stroke="#333" stroke-width="2.5"/>

  <!-- Digits: 1 0 0 0 -->
  <text x="100" y="295" text-anchor="middle" font-family="Courier New,monospace" font-weight="700" font-size="140" fill="#f97316">1</text>
  <text x="204" y="295" text-anchor="middle" font-family="Courier New,monospace" font-weight="700" font-size="140" fill="#f97316">0</text>
  <text x="308" y="295" text-anchor="middle" font-family="Courier New,monospace" font-weight="700" font-size="140" fill="#f97316">0</text>
  <text x="412" y="295" text-anchor="middle" font-family="Courier New,monospace" font-weight="700" font-size="140" fill="#fb923c">0</text>

  <!-- Flip line across center of counter -->
  <rect x="48" y="231" width="416" height="5" fill="#000" opacity="0.7"/>

  <!-- KG TOTAL inside panel, bottom -->
  <text x="256" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="20" fill="#f97316" letter-spacing="5" opacity="0.7">KG TOTAL</text>

  <!-- Bottom label: TONNES -->
  <text x="256" y="436" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="48" fill="#71717a" letter-spacing="14">TONNES</text>
</svg>
